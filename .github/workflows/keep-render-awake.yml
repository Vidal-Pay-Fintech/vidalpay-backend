name: Keep Render backend awake

on:
  schedule:
    # Render free web services sleep after 15 minutes without inbound traffic.
    # Offset from the top of the hour to reduce GitHub scheduler congestion.
    - cron: '2-57/5 * * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: keep-render-backend-awake
  cancel-in-progress: true

jobs:
  ping:
    name: Ping public health endpoint
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Check backend health
        env:
          HEALTH_URL: https://vidalpay-backend-1.onrender.com/api/v1/health
        run: |
          curl \
            --fail \
            --silent \
            --show-error \
            --location \
            --max-time 90 \
            --retry 2 \
            --retry-delay 5 \
            --header 'User-Agent: vidalpay-uptime-cron/1.0' \
            "$HEALTH_URL"
